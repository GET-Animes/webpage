name: Build and Deploy to Internal Test

on:
  push:
    branches:
      - pipeline

env:
  FLUTTER_VERSION: "3.27.2"
  JAVA_DISTRIBUITION: "corretto"
  JAVA_VERSION: "17"

jobs:
  build_release:
    name: Build Flutter App for Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUITION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Melos
        uses: bluefireteam/melos-action@v2

      - name: Build Release Web
        run: |
          cd get_animes_apps
          melos bs
          flutter build web --release --base-href "/webpage/"
          cd ..
          cp -f get_animes_apps/apps/web/build/web/* .

      - name: Create Commit for Deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout main
          git add .
          git commit -m "Build Release Web"
          git push
