name: Build and Deploy to Internal Test

on:
  push:
    branches:
      - pipeline

env:
  FLUTTER_VERSION: "3.32.0"
  JAVA_DISTRIBUITION: "corretto"
  JAVA_VERSION: "17"

jobs:
  build_release:
    name: Build Flutter App for Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUITION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Melos
        uses: bluefireteam/melos-action@v2

      - name: Build Release Web
        run: |
          cd get-anime-apps
          melos bs
          cd apps/web                    
          flutter build web --release --base-href "/webpage/"                    
          cd ../../../                   
          cp -rf ./get-anime-apps/apps/web/build/web/* ./

      - name: Create Commit for Deploy
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Build Release Web"
          git push
