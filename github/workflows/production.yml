name: Build and Deploy to Internal Test

on:
  push:
    branches:
      - main

env:
  FLUTTER_VERSION: "3.27.2"
  JAVA_DISTRIBUITION: "corretto"
  JAVA_VERSION: "17"

jobs:
  build_release:
    name: Build Flutter App for Web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUITION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Melos
        uses: bluefireteam/melos-action@v2

      - name: Install dependencies for all packages
        run: flutter pub get

      - name: Melos Sync all packages
        run: melos bs

      - name: Build Releases APK
        run: ./build.sh

      - name: Upload Mobile APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-mobile-release
          path: releases/mobile-release.apk

      - name: Upload TV APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-tv-release
          path: releases/tv-release.apk

      - name: Get current date
        id: date
        run: echo "::set-output name=date::$(date +'%Y.%m.%d')"

      - name: Create tag
        id: create_tag
        run: |
          TAG_NAME="release-${{ steps.date.outputs.date }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "::set-output name=tag_name::$TAG_NAME"

      - name: Create Release
        id: create_release
        run: |
          gh release create ${{ steps.create_tag.outputs.tag_name }} \
            --title "${{ steps.create_tag.outputs.tag_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        run: |
          gh release upload ${{ steps.create_tag.outputs.tag_name }} \
            releases/mobile-release.apk \
            releases/tv-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
